name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Evaluate exercises
      id: evaluate-exercises
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Evaluate exercises
        setup-command: ''
        command: python3 scripts/evaluate.py --auto
        timeout: 10
        max-score: 100
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        EVALUATE-EXERCISES_RESULTS: "${{steps.evaluate-exercises.outputs.result}}"
      with:
        runners: evaluate-exercises
